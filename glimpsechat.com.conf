# ============================================
# Glimpse Chat — Nginx 配置，通过隧道反向代理本地服务
# ============================================

# 隧道映射：云端 10084 -> 本地 Web 3001；云端 10085 -> 本地 API 4101
upstream glimpse_web { server 127.0.0.1:10084; }
upstream glimpse_api { server 127.0.0.1:10085; }

# HTTP → HTTPS 重定向
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        alias /root/nginx/acme/.well-known/acme-challenge/;
    }

    location / { return 301 https://$host$request_uri; }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name glimpsechat.com;

    ssl_certificate     /root/letsencrypt/config/live/glimpsechat.com/fullchain.pem;
    ssl_certificate_key /root/letsencrypt/config/live/glimpsechat.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 750m;

    location /.well-known/acme-challenge/ { alias /root/nginx/acme/.well-known/acme-challenge/; }

    location /socket.io/ {
        proxy_pass http://glimpse_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 86400s;
    }

    location ~ ^/(health|auth|conversations|contacts|search|favorites|media|admin|feedback|voice|ocr|assistant|system|api)(/|$) {
        proxy_pass http://glimpse_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /docs {
        proxy_pass http://glimpse_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://glimpse_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
